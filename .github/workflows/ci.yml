name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Frontend Tests
  frontend-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: TypeScript compilation check
      working-directory: frontend
      run: npx tsc --noEmit

    - name: Build
      working-directory: frontend
      run: npm run build

  # Backend Tests + Coverage
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile check (all Python files)
      run: |
        python -c "
        import py_compile, os
        errors = []
        for root, dirs, files in os.walk('src'):
            for f in files:
                if f.endswith('.py'):
                    try:
                        py_compile.compile(os.path.join(root, f), doraise=True)
                    except py_compile.PyCompileError as e:
                        errors.append(str(e))
        for root, dirs, files in os.walk('api'):
            for f in files:
                if f.endswith('.py'):
                    try:
                        py_compile.compile(os.path.join(root, f), doraise=True)
                    except py_compile.PyCompileError as e:
                        errors.append(str(e))
        if errors:
            for e in errors: print(e)
            raise SystemExit(1)
        print('All Python files compile OK')
        "

    - name: Run tests with coverage
      run: |
        python -m pytest tests/test_risk_manager.py tests/test_new_modules.py \
          --cov=src --cov-report=term-missing --cov-report=xml \
          -v --tb=short

    - name: Lint with flake8 (critical errors only)
      run: |
        pip install flake8
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # Backend Lint (non-blocking)
  backend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install
      run: |
        pip install -r requirements.txt
        pip install pylint mypy

    - name: Pylint
      run: pylint src/ --exit-zero --max-line-length=120
      continue-on-error: true

    - name: Mypy (type check)
      run: python -m mypy src/ --ignore-missing-imports --no-error-summary 2>/dev/null || true
      continue-on-error: true

  # Security Scan
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install
      run: pip install bandit detect-secrets

    - name: Bandit (Python security)
      run: bandit -r src/ -ll -ii --skip B101 2>/dev/null || true
      continue-on-error: true

    - name: Check for secrets
      run: detect-secrets scan . 2>/dev/null || true
      continue-on-error: true

  # Dependency Audit
  dependencies:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check for vulnerabilities
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt 2>/dev/null || true
      continue-on-error: true

  # Summary
  quality-gate:
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-tests]
    if: always()
    steps:
    - name: Quality Gate
      run: |
        echo "## CI/CD Results" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend: TypeScript + Build" >> $GITHUB_STEP_SUMMARY
        echo "- Backend: Tests + Coverage + Compile" >> $GITHUB_STEP_SUMMARY
        echo "- Security: Bandit + Secret Detection" >> $GITHUB_STEP_SUMMARY
        echo "- Dependencies: Vulnerability Audit" >> $GITHUB_STEP_SUMMARY
