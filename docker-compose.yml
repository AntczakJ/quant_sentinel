# ══════════════════════════════════════════════════════════════════════════════
#  Quant Sentinel — Docker Compose
#
#  Usage:
#    docker compose up -d              # start API
#    docker compose logs -f backend    # follow logs
#    docker compose down               # stop
#
#  Data: SQLite stored in Docker named volume (survives container restarts).
#  Models + logs: bind-mounted from host (shared with local dev).
# ══════════════════════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-sentinel-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=data/sentinel.db
      - PYTHONUNBUFFERED=1
    volumes:
      - sentinel-data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-sentinel-bot
    command: ["python", "run.py"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=data/sentinel.db
      - PYTHONUNBUFFERED=1
    volumes:
      - sentinel-data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - with-bot

volumes:
  sentinel-data:
    driver: local
