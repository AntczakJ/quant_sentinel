# ══════════════════════════════════════════════════════════════════════════════
#  Quant Sentinel — Docker Compose
#
#  Services:
#    backend  — FastAPI API + WebSocket + background tasks (scanner, resolver)
#    bot      — Telegram bot (optional, can run standalone)
#
#  Usage:
#    docker compose up -d              # start all services
#    docker compose up backend -d      # API only (no Telegram bot)
#    docker compose logs -f backend    # follow logs
#    docker compose down               # stop all
#
#  Data persistence:
#    - ./data/  mounted as volume (SQLite database)
#    - ./models/ mounted as volume (ML models)
#    - ./logs/  mounted as volume (application logs)
# ══════════════════════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-sentinel-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=data/sentinel.db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-sentinel-bot
    command: ["python", "run.py"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=data/sentinel.db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - with-bot  # Only starts with: docker compose --profile with-bot up
