<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0a500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#f0a500" stroke-width="1.2" opacity="0.35"/>

  <!-- Grid lines (subtle) -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#26264f" stroke-width="0.5"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#26264f" stroke-width="0.5"/>
  <line x1="8" y1="44" x2="56" y2="44" stroke="#26264f" stroke-width="0.5"/>

  <!-- Candlestick 1 — bearish (red) -->
  <line x1="14" y1="25" x2="14" y2="27" stroke="#ff3355" stroke-width="1.2"/>
  <rect x="11" y="27" width="6" height="10" rx="1" fill="#ff3355"/>
  <line x1="14" y1="37" x2="14" y2="40" stroke="#ff3355" stroke-width="1.2"/>

  <!-- Candlestick 2 — bullish (green) -->
  <line x1="25" y1="22" x2="25" y2="24" stroke="#00ff88" stroke-width="1.2"/>
  <rect x="22" y="24" width="6" height="12" rx="1" fill="#00ff88" opacity="0.9"/>
  <line x1="25" y1="36" x2="25" y2="39" stroke="#00ff88" stroke-width="1.2"/>

  <!-- Candlestick 3 — bullish big (green) -->
  <line x1="36" y1="16" x2="36" y2="19" stroke="#00ff88" stroke-width="1.2"/>
  <rect x="33" y="19" width="6" height="16" rx="1" fill="#00ff88"/>
  <line x1="36" y1="35" x2="36" y2="38" stroke="#00ff88" stroke-width="1.2"/>

  <!-- Candlestick 4 — bullish (green) -->
  <line x1="47" y1="12" x2="47" y2="15" stroke="#00ff88" stroke-width="1.2"/>
  <rect x="44" y="15" width="6" height="18" rx="1" fill="#00ff88"/>
  <line x1="47" y1="33" x2="47" y2="36" stroke="#00ff88" stroke-width="1.2"/>

  <!-- Gold trend line (with glow) -->
  <polyline
    points="11,33 22,28 33,21 44,16"
    stroke="url(#gold)"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Gold arrow at end of trend line -->
  <polygon points="53,11 47,14 50,19" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Bottom label: "QS" -->
  <text
    x="32"
    y="58"
    text-anchor="middle"
    font-family="monospace"
    font-size="6"
    font-weight="700"
    letter-spacing="2"
    fill="#f0a500"
    opacity="0.85"
  >QS</text>
</svg>

